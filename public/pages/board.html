<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>안아줘요 동물맨션 — 선발대 게시판</title>
  <link rel="stylesheet" href="../styles/shared.css">
  <style>
    .filter-bar { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
    .filter-btn {
      height: 30px; padding: 0 14px;
      border: 1px solid var(--border); border-radius: 20px;
      background: var(--card-bg); color: var(--text-muted);
      font-size: 13px; font-weight: 500; cursor: pointer;
      transition: background 0.12s, color 0.12s, border-color 0.12s;
    }
    .filter-btn:hover { background: var(--bg); color: var(--text); }
    .filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    .post-list { display: flex; flex-direction: column; gap: 8px; }
    .post-card {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 16px;
      border-radius: var(--radius);
      transition: box-shadow 0.15s, transform 0.12s;
    }
    .post-card:hover { box-shadow: var(--shadow); transform: translateY(-1px); }
    .post-main { flex: 1; display: flex; flex-direction: column; gap: 3px; min-width: 0; }
    .post-title { font-size: 15px; font-weight: 700; }
    .post-count { font-size: 12px; color: var(--text-muted); }
    .post-meta { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .post-author { font-size: 13px; color: var(--text-muted); }
    time { font-size: 12px; color: var(--text-muted); }

    @media (max-width: 640px) {
      .post-card { flex-wrap: wrap; gap: 6px; padding: 12px 14px; }
      .post-meta { width: 100%; justify-content: flex-end; }
      .post-title { font-size: 14px; }
    }
  </style>
</head>
<body>
  <nav id="nav">
    <span class="nav-logo">🏠 동물맨션</span>
    <a href="main.html">홈</a>
    <a href="view.html">직접 작성</a>
    <a href="extract.html">이미지 추출</a>
    <a href="board.html">선발대 게시판</a>
    <a href="official.html">퀘스트 게시판</a>
    <a href="progress.html">진척도</a>
    <div class="nav-spacer"></div>
    <div class="nav-user">
      <img id="nav-avatar" class="nav-avatar" src="" alt="">
      <span id="nav-username"></span>
      <button id="btn-logout">로그아웃</button>
    </div>
  </nav>

  <div class="container">
    <div class="page-header">
      <h1>선발대 게시판</h1>
      <a href="view.html" class="btn btn-primary" id="btn-new-quest">+ 새 퀘스트 작성</a>
    </div>

    <div class="filter-bar">
      <button class="filter-btn active" data-status="">전체</button>
      <button class="filter-btn" data-status="draft">작성중</button>
      <button class="filter-btn" data-status="review">검토요청</button>
      <button class="filter-btn" data-status="reject">반려</button>
      <button class="filter-btn" data-status="official">공식</button>
    </div>

    <div id="post-list" class="post-list"></div>
  </div>

  <script type="module" src="board.js"></script>
</body>
</html>
