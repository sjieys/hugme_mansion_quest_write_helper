<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>안아줘요 동물맨션 — 퀘스트 게시판</title>
  <link rel="stylesheet" href="../styles/shared.css">
  <style>
    .filter-bar { display: flex; gap: 6px; margin-bottom: 16px; }
    .filter-btn {
      height: 30px; padding: 0 14px;
      border: 1px solid var(--border); border-radius: 20px;
      background: var(--card-bg); color: var(--text-muted);
      font-size: 13px; font-weight: 500; cursor: pointer;
      transition: background 0.12s, color 0.12s, border-color 0.12s;
    }
    .filter-btn:hover { background: var(--bg); color: var(--text); }
    .filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    .official-list { display: flex; flex-direction: column; gap: 8px; }
    .official-card {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 16px;
      border-radius: var(--radius);
      transition: box-shadow 0.15s, transform 0.12s;
    }
    .official-card:hover { box-shadow: var(--shadow); transform: translateY(-1px); }
    .official-main { flex: 1; display: flex; flex-direction: column; gap: 4px; min-width: 0; }
    .official-title { font-size: 15px; font-weight: 700; }
    .official-meta { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

    .official-progress-wrap {
      display: flex; align-items: center; gap: 8px;
    }
    .official-progress-bar {
      flex: 1; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden;
    }
    .official-progress-fill {
      height: 100%; background: var(--accent); border-radius: 3px; transition: width 0.3s;
    }
    .official-progress-text {
      font-size: 11px; color: var(--text-muted); flex-shrink: 0; width: 30px; text-align: right;
    }

    .official-next-items {
      display: flex; gap: 10px; flex-wrap: wrap; align-items: center; padding: 2px 0;
    }
    .official-next-label {
      font-size: 11px; font-weight: 700; color: var(--text-muted);
      flex-shrink: 0;
    }
    .official-next-thumb {
      position: relative; width: 36px; height: 36px; flex-shrink: 0;
      border-radius: 7px; border: 1px solid var(--border); background: var(--bg);
    }
    .official-next-thumb img {
      width: 100%; height: 100%; object-fit: cover; border-radius: 6px;
    }
    .official-next-thumb .next-badge {
      position: absolute; bottom: -5px; right: -5px;
      min-width: 16px; height: 16px;
      background: rgba(0,0,0,.65); color: #fff;
      border-radius: 5px; font-size: 9px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      padding: 0 3px; line-height: 1; border: 1.5px solid var(--card-bg);
    }
    .official-next-done {
      font-size: 12px; color: #15803d; font-weight: 600;
    }

    @media (max-width: 640px) {
      .official-card { flex-wrap: wrap; gap: 8px; }
      .official-meta { width: 100%; justify-content: flex-end; }
      .official-next-thumb { width: 30px; height: 30px; }
      .official-next-thumb .next-badge { font-size: 8px; min-width: 14px; height: 14px; }
    }
  </style>
</head>
<body>
  <nav id="nav">
    <span class="nav-logo">🏠 동물맨션</span>
    <a href="main.html">홈</a>
    <a href="view.html">퀘스트 작성</a>
    <a href="extract.html">자동 추출</a>
    <a href="board.html">선발대 게시판</a>
    <a href="official.html">퀘스트 게시판</a>
    <a href="progress.html">진척도</a>
    <div class="nav-spacer"></div>
    <div class="nav-user">
      <img id="nav-avatar" class="nav-avatar" src="" alt="">
      <span id="nav-username"></span>
      <button id="btn-logout">로그아웃</button>
    </div>
  </nav>

  <div class="container">
    <div class="page-header">
      <h1>⭐ 퀘스트 게시판</h1>
    </div>

    <div class="filter-bar">
      <button class="filter-btn active" data-type="">전체</button>
      <button class="filter-btn" data-type="메인">메인</button>
      <button class="filter-btn" data-type="외전">외전</button>
    </div>

    <div id="official-list" class="official-list"></div>
  </div>

  <script type="module" src="official.js"></script>
</body>
</html>
