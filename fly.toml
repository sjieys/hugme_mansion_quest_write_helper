app = "hugme-mansion-quest"
primary_region = "nrt"

[build]

[env]
  PORT = "3000"
  DATA_DIR = "/data"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[mounts]]
  source = "quest_data"
  destination = "/data"
